name: Deploy portfolio

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-portfolio
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      # The prebuild step tries to refresh public/strapi-data.json from Strapi
      # (VITE_STRAPI_URL comes from the committed client/.env). If Strapi is
      # unreachable it logs an error and the committed JSON is used instead.
      - name: Build
        working-directory: client
        run: npm run build

      # Plain FTP: the host (ProFTPD at ftp.tuinenko.be) supports neither
      # FTPS (500 AUTH not understood) nor SFTP (port 22 closed).
      - name: Deploy over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: client/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
